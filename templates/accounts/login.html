{% extends 'base.html' %}
{% block title %}Kirish — IshTop{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">💼 IshTop</div>
        <h2>Tizimga kirish</h2>
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Foydalanuvchi nomi</label>
                <input type="text" name="username" class="form-control" autofocus required placeholder="username">
            </div>
            <div class="form-group">
                <label>Parol</label>
                <input type="password" name="password" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg">Kirish</button>
        </form>
        <p class="auth-switch">Hisobingiz yo'qmi? <a href="{% url 'register' %}">Ro'yxatdan o'ting</a></p>
    </div>
</div>
{% endblock %}
